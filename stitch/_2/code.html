<!DOCTYPE html>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col antialiased selection:bg-primary selection:text-white">

</div>

<div class="px-4 pb-4">
<label class="relative flex w-full items-center">

</div>
<input class="block w-full rounded-lg border-0 py-3 pl-10 pr-4 bg-white dark:bg-surface-dark text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-primary shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10" placeholder="Поиск..." type="text"/>

<label class="flex items-start gap-4 p-4 hover:bg-slate-50 dark:hover:bg-white/5 cursor-pointer transition-colors border-b border-slate-100 dark:border-border-dark last:border-0">

<input class="peer h-5 w-5 rounded border-slate-300 dark:border-slate-600 text-primary focus:ring-primary/50 dark:focus:ring-offset-surface-dark bg-transparent" type="checkbox"/>

<label class="flex items-start gap-4 p-4 hover:bg-slate-50 dark:hover:bg-white/5 cursor-pointer transition-colors border-b border-slate-100 dark:border-border-dark last:border-0">

<input class="peer h-5 w-5 rounded border-slate-300 dark:border-slate-600 text-primary focus:ring-primary/50 dark:focus:ring-offset-surface-dark bg-transparent" type="checkbox"/>

<span class="text-base font-medium leading-tight peer-checked:text-slate-500 dark:peer-checked:text-slate-400 peer-checked:line-through transition-all">Божба</span>

<label class="flex items-start gap-4 p-4 hover:bg-slate-50 dark:hover:bg-white/5 cursor-pointer transition-colors border-b border-slate-100 dark:border-border-dark last:border-0">

</div>

<nav class="fixed bottom-0 w-full bg-white dark:bg-surface-dark border-t border-slate-200 dark:border-border-dark pb-safe-bottom">

<span class="material-symbols-outlined text-primary text-[28px] font-variation-settings-fill">list_alt</span>
<span class="text-[10px] font-medium text-primary">Каталог</span>

<a class="flex flex-col items-center justify-center p-2 rounded-lg gap-1 min-w-[4rem] group" href="#">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300 transition-colors text-[24px]">bookmark</span>
<span class="text-[10px] font-medium text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300 transition-colors">Избранное</span>

<a class="flex flex-col items-center justify-center p-2 rounded-lg gap-1 min-w-[4rem] group" href="#">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300 transition-colors text-[24px]">account_circle</span>
<span class="text-[10px] font-medium text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300 transition-colors">Профиль</span>

<style>
        .font-variation-settings-fill {
